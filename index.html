<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Student Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>School Student Management</h1>
      <p>Manage student records with add, edit, and delete actions.</p>

      <div class="panel">
        <h2>Student Form</h2>
        <form id="studentForm">
          <input type="hidden" id="studentId" />

          <div class="grid">
            <label>
              Name
              <input type="text" id="name" placeholder="Enter student name" required />
            </label>
            <label>
              Class
              <input type="text" id="className" placeholder="e.g. 10-A" required />
            </label>
            <label>
              Roll Number
              <input type="text" id="rollNumber" placeholder="e.g. 101" required />
            </label>
            <label>
              Age
              <input type="number" id="age" min="1" max="25" required />
            </label>
            <label>
              Phone
              <input type="text" id="phone" placeholder="Enter phone" required />
            </label>
            <label>
              Email
              <input type="email" id="email" placeholder="Enter email" required />
            </label>
          </div>

          <label>
            Address
            <textarea id="address" rows="3" placeholder="Enter address" required></textarea>
          </label>

          <div class="actions">
            <button type="submit" id="submitBtn">Add Student</button>
            <button type="button" id="cancelEdit" class="secondary hidden">Cancel Edit</button>
          </div>
        </form>
      </div>

      <div id="message" class="message"></div>

      <div class="panel">
        <h2>Student Records</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Class</th>
              <th>Roll No</th>
              <th>Age</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentTableBody"></tbody>
        </table>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
